name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: npm ci

      - name: Build .NET service
        run: npm run build:service

      - name: Clean stale artifacts
        run: npm run clean:dist

      - name: Build Electron app
        run: npm run build

      - name: Package release artifacts
        # Optional code signing (step 8+)
        # CSC_LINK: ${{ secrets.CSC_LINK }}
        # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Verify release artifacts
        shell: bash
        run: |
          ls -la release/Steam-Achievement-Manager-Setup.exe
          ls -la release/Steam-Achievement-Manager-Setup.exe.blockmap
          ls -la release/latest.yml
          ls -la release/win-unpacked/resources/sam-service/SAM.Service.exe.config

      - name: Publish verified release artifacts
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            electron/release/Steam-Achievement-Manager-Setup.exe
            electron/release/Steam-Achievement-Manager-Setup.exe.blockmap
            electron/release/latest.yml
