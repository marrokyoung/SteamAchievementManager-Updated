name: CI

on:
  pull_request:
    paths:
      - 'electron/**'
      - 'SAM.Service/**'
      - 'SAM.Service.Tests/**'
      - 'SAM.API/**'
      - 'SAM.Schema/**'
      - 'SAM.sln'
      - '.github/workflows/ci.yml'
  push:
    branches: [master, main]
    paths:
      - 'electron/**'
      - 'SAM.Service/**'
      - 'SAM.Service.Tests/**'
      - 'SAM.API/**'
      - 'SAM.Schema/**'
      - 'SAM.sln'
      - '.github/workflows/ci.yml'

jobs:
  electron-tests:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Electron tests
        run: npm run test:run

      - name: TypeScript check
        run: npx tsc --noEmit

  dotnet-tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build SAM.Service
        run: dotnet build SAM.Service -c Debug -p:Platform=x86

      - name: Run SAM.Service.Tests
        run: dotnet test SAM.Service.Tests -c Debug -p:Platform=x86
